name: Streamlit App CI/CD → Hugging Face Spaces

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. CI: build & smoke-test ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install streamlit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Smoke Test
        run: |
          streamlit run app.py --server.headless true &
          PID=$!
          sleep 10
          kill $PID

  # ── 2. CD: deploy to Hugging Face Spaces (only on push to main) ───────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Track binary files with Git LFS
        run: |
          git lfs track "*.ttf"
          git lfs track "*.otf"
          git lfs track "*.woff"
          git lfs track "*.woff2"
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"
          git lfs track "*.gif"
          git lfs track "*.ico"
          git lfs track "*.pkl"
          git lfs track "*.pt"
          git lfs track "*.bin"
          git add .gitattributes
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git diff --staged --quiet || git commit -m "ci: track binary files with Git LFS"

      - name: Push to Hugging Face Space
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          git push --force \
            https://fatimaaisha002:$HF_API_TOKEN@huggingface.co/spaces/fatimaaisha002/agriguard-ai \
            main
