name: Deploy Space to Hugging Face
on:
  push:
    branches: [ main ]  # change if your default branch is different

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: "fatimaaisha002/agriguard-ai"  # change to your HF repo id if different
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get('HF_TOKEN')
          repo_id = os.environ.get('HF_REPO')
          if not token:
              raise SystemExit('HF_TOKEN is not set in secrets')

          api = HfApi()

          # create the space repo if it doesn't exist
          api.create_repo(repo_id=repo_id, token=token, repo_type='space', exist_ok=True, private=False)

          # Upload the repository files to the Space.
          # upload_folder will push files from folder_path to the HF repo.
          # Exclude .git to avoid pushing git internals.
          api.upload_folder(
              repo_id=repo_id,
              repo_type='space',
              folder_path='.',            # local folder to upload
              path_in_repo='',            # where to place files in the HF repo
              token=token,
              commit_message='Auto deploy Space from GitHub Actions',
              ignore_patterns=['.git']    # ignore git internals
          )

          print('Upload finished.')
          PY
