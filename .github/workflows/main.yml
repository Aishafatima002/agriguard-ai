- name: Install/upgrade huggingface_hub
  run: pip install --upgrade huggingface_hub

- name: Check HF token presence
  run: |
    python - <<'PY'
    import os
    from huggingface_hub import __version__ as hf_version
    print("huggingface_hub version:", hf_version)
    print("HF_TOKEN present" if os.environ.get("HF_TOKEN") else "HF_TOKEN NOT set")
    PY
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}

- name: Deploy to Hugging Face Space
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
    HF_REPO: "fatimaaisha002/agriguard-ai"
    SPACE_SDK: "streamlit"
  run: |
    python - <<'PY'
    import os
    from huggingface_hub import HfApi
    from huggingface_hub import errors

    token = os.environ.get("HF_TOKEN")
    repo_id = os.environ.get("HF_REPO")
    sdk = os.environ.get("SPACE_SDK", "streamlit")
    if not token:
        raise SystemExit("HF token is not set. Add it as a repository secret (HF_API_TOKEN or HF_TOKEN).")
    api = HfApi()
    try:
        api.create_repo(repo_id=repo_id, token=token, repo_type="space", space_sdk=sdk, exist_ok=True, private=False)
    except errors.BadRequestError:
        if sdk == "streamlit":
            api.create_repo(repo_id=repo_id, token=token, repo_type="space", space_sdk="static", exist_ok=True, private=False)
        else:
            raise
    api.upload_folder(repo_id=repo_id, repo_type="space", folder_path=".", path_in_repo="", token=token, commit_message="Auto deploy from GitHub Actions", ignore_patterns=[".git", ".github"])
    print("Upload finished.")
    PY
