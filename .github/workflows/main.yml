name: Deploy Space to Hugging Face
on:
  push:
    branches: [ main ]

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install/upgrade huggingface_hub
        run: pip install --upgrade huggingface_hub

      - name: Check HF token presence
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # change to HF_API_TOKEN if that's the secret you created
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import __version__ as hf_version
          print("huggingface_hub version:", hf_version)
          print("HF_TOKEN present" if os.environ.get("HF_TOKEN") else "HF_TOKEN NOT set")
          PY

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # must match the secret name you create in repo Settings
          HF_REPO: "fatimaaisha002/agriguard-ai"   # change if needed
          SPACE_SDK: "streamlit"                   # use "gradio" if your app uses Gradio
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          from huggingface_hub import errors

