name: Deploy Space to Hugging Face
on:
  push:
    branches: [ main ]  # change if your default branch is different

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: "fatimaaisha002/agriguard-ai"  # change to your HF repo id if different
          SPACE_SDK: "streamlit" 
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get('HF_TOKEN')
          repo_id = os.environ.get('HF_REPO')
          sdk = os.environ.get("SPACE_SDK", "streamlit")
          if not token:
              raise SystemExit('HF_TOKEN is not set in secrets')

          api = HfApi()

          api.create_repo(
              repo_id=repo_id,
              token=token,
              repo_type="space",
              space_sdk=sdk,
              exist_ok=True,
              private=False
          )

          # Upload repository files to the Space (ignore git internals)
          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".",
              path_in_repo="",
              token=token,
              commit_message="Auto deploy Space from GitHub Actions",
              ignore_patterns=[".git", ".github"]
          )

          print("Upload finished.")
          PY
